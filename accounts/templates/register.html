{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}
<style>
    .card.static:hover {
    transform: none !important;
    transition: none !important;
    box-shadow: none !important;
}
</style>

<div class="container mt-5">
    <h2 class="text-center card-title">Registro de Usuario</h2>

    <div class="card static">
        <div class="card-body">
            <form method="post" class="text-center">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username" class="d-block text-left">Nombre de usuario</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label for="email" class="d-block text-left">Correo electrónico</label>
                    {{ form.email }}
                </div>

                <div class="form-group">
                    <label for="role" class="d-block text-left">Rol</label>
                    {{ form.role }}
                </div>

                <div class="form-group">
                    <label for="organization" class="d-block text-left mt-2">Organización</label>
                    {{ form.organization }}
                </div>

                <div class="form-group">
                    <label for="password1" class="d-block text-left">Contraseña</label>
                    {{ form.password1 }}
                </div>

                <div class="form-group">
                    <label for="password2" class="d-block text-left">Confirmar contraseña</label>
                    {{ form.password2 }}
                </div>

                <button type="submit" class="button w-100 mt-3">Registrarse</button>
            </form>
            <p class="text-center mt-3">
                ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-link">Inicia sesión aquí</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
