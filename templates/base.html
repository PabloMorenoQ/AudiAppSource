{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AudiApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Asegurar que el footer siempre quede abajo */
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1; /* Permite que el contenido empuje el footer hacia abajo */
        }

        footer {
            background-color: var(--nav-bar);
            color: white;
            text-align: center;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <!-- Logo con enlace corregido -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                <img src="{% static 'img/company_logo.jpg' %}" alt="Logo" class="logo-navbar me-2">
                <span>AudiApp</span>
            </a>    
    
            <!-- Botón de colapso para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <!-- Contenido del navbar -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'configurations' %}">Configuración</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lists' %}">Listas de Verificación</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'auditPlan' %}">Plan de Auditoría</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'reports' %}">Informe</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Perfil</a></li>
    
                    <!-- Dropdown de idioma corregido -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button" data-bs-toggle="dropdown">
                            🌐 Idioma
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="{% url 'change_language' 'es' %}">Español</a></li>
                            <li><a class="dropdown-item" href="{% url 'change_language' 'en' %}">English</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    
    <!-- Contenido dinámico -->
    <div class="container my-4">
        {% block content %} {% endblock %}
    </div>

    <!-- Footer (Siempre en la parte inferior) -->
    <footer class="text-white text-center py-3 mt-auto">
        <p><i class="fa-solid fa-copyright"></i> 2024 AudiApp </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
